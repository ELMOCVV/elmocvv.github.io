<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#ffffff">
  <title>Art Studio AI</title>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@500;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; }

    html {
      -webkit-text-size-adjust: 100%;
      height: 100%;
    }

    body {
      margin: 0;
      min-height: 100%;
      min-height: 100dvh;
      background: var(--tg-theme-bg-color, #fff);
      color: var(--tg-theme-text-color, #222);
      font-family: 'Montserrat', sans-serif;
      overflow-x: hidden;
      padding:
        max(12px, env(safe-area-inset-top))
        max(12px, env(safe-area-inset-right))
        max(16px, env(safe-area-inset-bottom))
        max(12px, env(safe-area-inset-left));
      padding-bottom: max(20px, calc(env(safe-area-inset-bottom) + 8px));
    }

    /* Логотип */
    .logo {
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 16px 12px 12px;
    }
    .logo img {
      width: min(420px, 88vw);
      max-width: 100%;
      height: auto;
      display: block;
      object-fit: contain;
    }

    /* Приветствие */
    .welcome {
      text-align: center;
      font-size: clamp(18px, 4.5vw, 22px);
      font-weight: 600;
      color: var(--tg-theme-link-color, #005C9C);
      margin-bottom: 12px;
      line-height: 1.3;
      padding: 0 4px;
    }

    /*
      Смуга категорій на всю ширину екрана (компенсація padding body),
      щоб при горизонтальному скролі не з’являлась біла смуга збоку.
    */
    nav {
      display: flex;
      overflow-x: auto;
      gap: 10px;
      margin-left: calc(-1 * max(12px, env(safe-area-inset-left)));
      margin-right: calc(-1 * max(12px, env(safe-area-inset-right)));
      padding: 12px max(12px, env(safe-area-inset-right)) 12px max(12px, env(safe-area-inset-left));
      background: var(--tg-theme-secondary-bg-color, #f9f9f9);
      border-bottom: 1px solid var(--tg-theme-hint-color, #ddd);
      scroll-behavior: smooth;
      -webkit-overflow-scrolling: touch;
      scrollbar-width: none;
    }
    nav::-webkit-scrollbar { display: none; }
    nav button {
      flex: 0 0 auto;
      background: var(--tg-theme-bg-color, #fff);
      border: 2px solid var(--tg-theme-button-color, #005C9C);
      padding: 12px 18px;
      min-height: 44px;
      border-radius: 22px;
      color: var(--tg-theme-button-color, #005C9C);
      cursor: pointer;
      transition: background 0.2s, color 0.2s, border-color 0.2s;
      font-weight: 600;
      font-size: clamp(14px, 3.8vw, 17px);
      font-family: inherit;
      -webkit-tap-highlight-color: transparent;
      touch-action: manipulation;
    }
    nav button.active,
    nav button:active {
      background: var(--tg-theme-button-color, #005C9C);
      border-color: var(--tg-theme-button-color, #005C9C);
      color: var(--tg-theme-button-text-color, #fff);
    }

    @media (hover: hover) {
      nav button:hover { background: var(--tg-theme-button-color, #005C9C); color: var(--tg-theme-button-text-color, #fff); }
      nav button.active:hover { filter: brightness(1.05); }
      .card button:hover { background: #003bb5; }
    }

    /* Сетка товаров */
    .grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: clamp(10px, 3vw, 18px);
      padding: 14px 0 0;
      max-width: 100%;
    }
    .card {
      background: var(--tg-theme-secondary-bg-color, #fdfdfd);
      border-radius: 14px;
      padding: clamp(10px, 3vw, 16px);
      text-align: center;
      border: 1px solid var(--tg-theme-hint-color, #eee);
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.06);
      min-width: 0;
    }
    .card img {
      width: 100%;
      aspect-ratio: 1 / 1;
      object-fit: cover;
      border-radius: 10px;
      vertical-align: middle;
    }
    .card h3 {
      margin: 10px 0 0;
      font-size: clamp(14px, 3.6vw, 18px);
      font-weight: 600;
      line-height: 1.25;
      word-break: break-word;
    }
    .card button {
      margin-top: 10px;
      background: var(--tg-theme-button-color, #005C9C);
      border: none;
      padding: 14px 12px;
      min-height: 44px;
      border-radius: 10px;
      cursor: pointer;
      font-weight: 700;
      color: var(--tg-theme-button-text-color, #fff);
      font-size: clamp(14px, 3.6vw, 17px);
      font-family: inherit;
      width: 100%;
      -webkit-tap-highlight-color: transparent;
      touch-action: manipulation;
    }
    .card button:active { filter: brightness(0.95); }

    /* Очень узкие экраны — одна колонка читается лучше */
    @media (max-width: 340px) {
      .grid { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <!-- Логотип -->
  <div class="logo">
    <img src="img/logo.png" alt="Art Studio AI">
  </div>

  <!-- Приветствие -->
  <div class="welcome">Привіт, користувач!</div>

  <!-- Навигация -->
  <nav>
    <button type="button" class="active" data-cat="top" onclick="showCategory('top', this)">🔥 Топ продажів</button>
    <button type="button" data-cat="men" onclick="showCategory('men', this)">👔 Для нього</button>
    <button type="button" data-cat="women" onclick="showCategory('women', this)">💎 Для неї</button>
  </nav>

  <!-- Товары -->
  <section id="products" class="grid"></section>

  <script>
    const products = {
      top: [
        { name: "Картина №1" },
        { name: "Картина №2" },
        { name: "Картина №3" },
        { name: "Картина №4" },
        { name: "Картина №5" },
        { name: "Картина №6" }
      ],
      men: [
        { name: "Пейзаж для нього" },
        { name: "Абстракція для нього" },
        { name: "Мінімалізм для нього" },
        { name: "Портрет для нього" },
        { name: "Геометрія для нього" },
        { name: "Нічне місто для нього" }
      ],
      women: [
        { name: "Квіти для неї" },
        { name: "Пастель для неї" },
        { name: "Вінтаж для неї" },
        { name: "Мрія для неї" },
        { name: "Світанок для неї" },
        { name: "Золото для неї" }
      ]
    };

    /** Різні реальні фото з мережі (Lorem Picsum): стабільне зображення на кожну картку */
    function demoPhotoUrl(cat, index, title) {
      const seed = encodeURIComponent([cat, index, title].join("-")).slice(0, 64);
      return `https://picsum.photos/seed/${seed}/800/800`;
    }

    function showCategory(cat, btn) {
      document.querySelectorAll("nav button").forEach(b => b.classList.remove("active"));
      const activeBtn = btn || document.querySelector(`nav button[data-cat="${cat}"]`);
      if (activeBtn) activeBtn.classList.add("active");
      const grid = document.getElementById("products");
      grid.innerHTML = "";
      products[cat].forEach((p, i) => {
        const img = demoPhotoUrl(cat, i, p.name);
        const safeName = p.name.replace(/'/g, "\\'");
        const altAttr = p.name.replace(/&/g, "&amp;").replace(/"/g, "&quot;");
        grid.innerHTML += `
          <div class="card">
            <img src="${img}" alt="${altAttr}" loading="lazy" decoding="async">
            <h3>${p.name}</h3>
            <button onclick="Telegram.WebApp.sendData('${safeName}')">Купити</button>
          </div>`;
      });
    }

    (function initTelegram() {
      const tg = window.Telegram && window.Telegram.WebApp;
      if (!tg) return;
      tg.ready();
      tg.expand();
      if (tg.themeParams && tg.themeParams.bg_color) {
        document.querySelector('meta[name="theme-color"]')?.setAttribute('content', tg.themeParams.bg_color);
      }
    })();

    showCategory('top');
  </script>
</body>
</html>
