<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#ffffff">
  <title>Art Studio AI</title>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <script>
    (function () {
      function initialTheme() {
        try {
          var stored = localStorage.getItem('artstudio-theme');
          if (stored === 'light' || stored === 'dark') return stored;
          var tg = window.Telegram && window.Telegram.WebApp;
          if (tg && tg.colorScheme === 'dark') return 'dark';
          if (tg && tg.colorScheme === 'light') return 'light';
          if (window.matchMedia && matchMedia('(prefers-color-scheme: dark)').matches) return 'dark';
        } catch (e) { /* приватний режим тощо */ }
        return 'light';
      }
      document.documentElement.setAttribute('data-theme', initialTheme());
    })();
  </script>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@500;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; }

    /* Дві фіксовані бренд-теми; активна — через data-theme на <html> */
    html[data-theme="light"] {
      --app-bg: #ffffff;
      --app-text: #222222;
      --app-accent: #005c9c;
      --app-accent-hover: #004a7a;
      --app-secondary-bg: #f9f9f9;
      --app-card-bg: #fdfdfd;
      --app-border: #eeeeee;
      --app-border-nav: #dddddd;
      --app-on-accent: #ffffff;
      --app-welcome: #005c9c;
      --app-card-shadow: rgba(0, 0, 0, 0.06);
      --app-theme-switch-bg: #f0f3f6;
      --app-theme-switch-muted: rgba(34, 34, 34, 0.45);
    }
    html[data-theme="dark"] {
      --app-bg: #161a1f;
      --app-text: #e8eaef;
      --app-accent: #3d9fd4;
      --app-accent-hover: #5cb3e0;
      --app-secondary-bg: #1f242c;
      --app-card-bg: #232a33;
      --app-border: #343c48;
      --app-border-nav: #2c333d;
      --app-on-accent: #ffffff;
      --app-welcome: #6ec5ff;
      --app-card-shadow: rgba(0, 0, 0, 0.35);
      --app-theme-switch-bg: #252b34;
      --app-theme-switch-muted: rgba(232, 234, 239, 0.45);
    }

    html {
      -webkit-text-size-adjust: 100%;
      height: 100%;
      color-scheme: light dark;
    }

    body {
      margin: 0;
      min-height: 100%;
      min-height: 100dvh;
      background: var(--app-bg);
      color: var(--app-text);
      font-family: 'Montserrat', sans-serif;
      overflow-x: hidden;
      padding:
        max(12px, env(safe-area-inset-top))
        max(12px, env(safe-area-inset-right))
        max(16px, env(safe-area-inset-bottom))
        max(12px, env(safe-area-inset-left));
      padding-bottom: max(20px, calc(env(safe-area-inset-bottom) + 8px));
    }

    /* Перемикач теми */
    .theme-bar {
      display: flex;
      justify-content: flex-end;
      align-items: center;
      margin: -4px 0 4px;
      padding: 0 2px;
    }
    .theme-switch {
      display: inline-flex;
      padding: 3px;
      border-radius: 999px;
      background: var(--app-theme-switch-bg);
      border: 1px solid var(--app-border);
      gap: 2px;
    }
    .theme-switch button {
      margin: 0;
      border: none;
      cursor: pointer;
      font: inherit;
      font-size: 15px;
      line-height: 1;
      min-width: 40px;
      min-height: 36px;
      border-radius: 999px;
      padding: 8px 10px;
      background: transparent;
      color: var(--app-theme-switch-muted);
      transition: background 0.2s, color 0.2s;
      -webkit-tap-highlight-color: transparent;
      touch-action: manipulation;
    }
    .theme-switch button[aria-pressed="true"] {
      background: var(--app-accent);
      color: var(--app-on-accent);
      box-shadow: 0 1px 3px var(--app-card-shadow);
    }
    .theme-switch button[aria-pressed="false"]:active {
      color: var(--app-text);
      opacity: 0.85;
    }
    @media (hover: hover) {
      .theme-switch button[aria-pressed="false"]:hover {
        color: var(--app-text);
      }
    }

    /* Логотип */
    .logo {
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 16px 12px 12px;
    }
    .logo img {
      width: min(420px, 88vw);
      max-width: 100%;
      height: auto;
      display: block;
      object-fit: contain;
      background: var(--app-bg);
      border-radius: 12px;
    }

    /* Приветствие */
    .welcome {
      text-align: center;
      font-size: clamp(18px, 4.5vw, 22px);
      font-weight: 600;
      color: var(--app-welcome);
      margin-bottom: 12px;
      line-height: 1.3;
      padding: 0 4px;
    }

    /*
      Смуга категорій на всю ширину екрана (компенсація padding body),
      щоб при горизонтальному скролі не з’являлась біла смуга збоку.
    */
    nav {
      display: flex;
      overflow-x: auto;
      gap: 10px;
      margin-left: calc(-1 * max(12px, env(safe-area-inset-left)));
      margin-right: calc(-1 * max(12px, env(safe-area-inset-right)));
      padding: 12px max(12px, env(safe-area-inset-right)) 12px max(12px, env(safe-area-inset-left));
      background: var(--app-secondary-bg);
      border-bottom: 1px solid var(--app-border-nav);
      scroll-behavior: smooth;
      -webkit-overflow-scrolling: touch;
      scrollbar-width: none;
    }
    nav::-webkit-scrollbar { display: none; }
    nav button {
      flex: 0 0 auto;
      background: var(--app-bg);
      border: 2px solid var(--app-accent);
      padding: 12px 18px;
      min-height: 44px;
      border-radius: 22px;
      color: var(--app-accent);
      cursor: pointer;
      transition: background 0.2s, color 0.2s, border-color 0.2s;
      font-weight: 600;
      font-size: clamp(14px, 3.8vw, 17px);
      font-family: inherit;
      -webkit-tap-highlight-color: transparent;
      touch-action: manipulation;
    }
    nav button.active,
    nav button:active {
      background: var(--app-accent);
      border-color: var(--app-accent);
      color: var(--app-on-accent);
    }

    @media (hover: hover) {
      nav button:hover { background: var(--app-accent); color: var(--app-on-accent); }
      nav button.active:hover { filter: brightness(1.05); }
      .card button:hover { background: var(--app-accent-hover); }
    }

    /* Сетка товаров */
    .grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: clamp(10px, 3vw, 18px);
      padding: 14px 0 0;
      max-width: 100%;
      transition: opacity 0.26s ease, transform 0.26s ease;
    }
    .grid.grid--cat-hiding {
      opacity: 0;
      transform: translateY(6px);
      pointer-events: none;
    }
    @keyframes gridCatIn {
      from { opacity: 0; transform: translateY(8px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .grid.grid--cat-enter {
      animation: gridCatIn 0.32s ease-out both;
    }
    .card {
      background: var(--app-card-bg);
      border-radius: 14px;
      padding: clamp(10px, 3vw, 16px);
      text-align: center;
      border: 1px solid var(--app-border);
      box-shadow: 0 2px 8px var(--app-card-shadow);
      min-width: 0;
    }
    .card img {
      width: 100%;
      aspect-ratio: 1 / 1;
      object-fit: cover;
      border-radius: 10px;
      vertical-align: middle;
    }
    .card h3 {
      margin: 10px 0 0;
      font-size: clamp(14px, 3.6vw, 18px);
      font-weight: 600;
      line-height: 1.25;
      word-break: break-word;
      color: var(--app-text);
    }
    .card button {
      margin-top: 10px;
      background: var(--app-accent);
      border: none;
      padding: 14px 12px;
      min-height: 44px;
      border-radius: 10px;
      cursor: pointer;
      font-weight: 700;
      color: var(--app-on-accent);
      font-size: clamp(14px, 3.6vw, 17px);
      font-family: inherit;
      width: 100%;
      -webkit-tap-highlight-color: transparent;
      touch-action: manipulation;
    }
    .card button:active { filter: brightness(0.95); }

    .grid.grid--empty {
      display: flex;
      justify-content: center;
      align-items: flex-start;
      padding-top: 18px;
    }
    .catalog-empty {
      max-width: 340px;
      margin: 0 auto;
      padding: 22px 20px 26px;
      text-align: center;
      background: var(--app-card-bg);
      border: 1px dashed var(--app-border);
      border-radius: 16px;
      color: var(--app-text);
      box-shadow: 0 1px 6px var(--app-card-shadow);
    }
    .catalog-empty-title {
      margin: 0 0 10px;
      font-size: clamp(16px, 4vw, 18px);
      font-weight: 700;
      line-height: 1.3;
    }
    .catalog-empty-text {
      margin: 0;
      font-size: 14px;
      line-height: 1.55;
      opacity: 0.82;
    }

    /* Очень узкие экраны — одна колонка читается лучше */
    @media (max-width: 340px) {
      .grid { grid-template-columns: 1fr; }
    }

    @media (prefers-reduced-motion: reduce) {
      .product-gallery-frame img,
      .product-thumbs button,
      .size-option,
      .grid {
        transition: none !important;
        animation: none !important;
      }
      .grid.grid--cat-enter {
        animation: none !important;
        opacity: 1 !important;
        transform: none !important;
      }
      .grid.grid--cat-hiding {
        opacity: 1 !important;
        transform: none !important;
      }
      #view-catalog,
      #view-product {
        transition: none !important;
        animation: none !important;
      }
      #view-catalog.main-view-in,
      #view-product.main-view-in {
        animation: none !important;
        opacity: 1 !important;
        transform: none !important;
      }
      #view-catalog.main-view-out,
      #view-product.main-view-out {
        opacity: 1 !important;
      }
      .size-preview-wrap img {
        transition: none !important;
      }
      .size-preview-wrap img.is-exiting {
        opacity: 1 !important;
        transform: none !important;
      }
    }

    .view-hidden {
      display: none !important;
    }

    /* Перехід каталог ↔ картка товару */
    #view-catalog,
    #view-product {
      transition: opacity 0.26s ease;
    }
    #view-catalog.main-view-out,
    #view-product.main-view-out {
      opacity: 0;
      pointer-events: none;
    }
    @keyframes mainViewIn {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }
    #view-catalog.main-view-in,
    #view-product.main-view-in {
      animation: mainViewIn 0.34s ease-out both;
      transition: none;
    }

    .product-back {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      margin: 0 0 14px;
      padding: 10px 14px 10px 10px;
      border: 1px solid var(--app-border);
      border-radius: 999px;
      background: var(--app-card-bg);
      color: var(--app-accent);
      font: inherit;
      font-weight: 600;
      font-size: 15px;
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
      touch-action: manipulation;
    }
    .product-back:active { opacity: 0.9; }

    .product-detail { max-width: 520px; margin: 0 auto; }
    .product-detail h1 {
      margin: 0 0 10px;
      font-size: clamp(20px, 5vw, 24px);
      font-weight: 700;
      line-height: 1.25;
      color: var(--app-text);
    }
    .product-desc {
      margin: 0 0 18px;
      font-size: 15px;
      line-height: 1.5;
      color: var(--app-text);
      opacity: 0.88;
    }

    .product-gallery-main {
      border-radius: 14px;
      overflow: hidden;
      background: var(--app-secondary-bg);
      border: 1px solid var(--app-border);
      margin-bottom: 10px;
    }
    /*
      Кадр 4:5 на обгортці + absolute на img — у WebView TG aspect-ratio інколи
      не спрацьовує на replaced element, через що фото тягнеться «в довжину».
    */
    .product-gallery-frame {
      position: relative;
      width: 100%;
      max-width: 100%;
      height: 0;
      padding-bottom: 125%;
      overflow: hidden;
    }
    .product-gallery-frame img {
      position: absolute;
      left: 0;
      top: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      object-position: center;
      display: block;
      margin: 0;
      opacity: 1;
      transition: opacity 0.28s ease;
    }
    .product-thumbs {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      margin-bottom: 20px;
    }
    .product-thumbs button {
      padding: 0;
      border: 2px solid transparent;
      border-radius: 10px;
      overflow: hidden;
      cursor: pointer;
      width: calc((100% - 16px) / 3);
      max-width: 88px;
      flex: 0 0 auto;
      background: var(--app-secondary-bg);
      -webkit-tap-highlight-color: transparent;
      touch-action: manipulation;
      transition: border-color 0.22s ease, transform 0.2s ease;
    }
    .product-thumbs button.is-active {
      border-color: var(--app-accent);
    }
    .product-thumbs button:active {
      transform: scale(0.97);
    }
    .product-thumb-frame {
      display: block;
      position: relative;
      width: 100%;
      height: 0;
      padding-bottom: 125%;
      overflow: hidden;
    }
    .product-thumb-frame img {
      position: absolute;
      left: 0;
      top: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      object-position: center;
      display: block;
      margin: 0;
      pointer-events: none;
    }

    .product-section-title {
      font-size: 13px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.04em;
      color: var(--app-text);
      opacity: 0.55;
      margin: 0 0 10px;
    }
    .size-list {
      display: flex;
      flex-direction: column;
      gap: 8px;
      margin-bottom: 16px;
    }
    .size-option {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      width: 100%;
      padding: 14px 16px;
      border: 2px solid var(--app-border);
      border-radius: 12px;
      background: var(--app-card-bg);
      color: var(--app-text);
      font: inherit;
      font-weight: 600;
      font-size: 15px;
      text-align: left;
      cursor: pointer;
      transition: border-color 0.24s ease, background 0.24s ease;
      -webkit-tap-highlight-color: transparent;
      touch-action: manipulation;
    }
    .size-option.is-selected {
      border-color: var(--app-accent);
      background: var(--app-secondary-bg);
    }
    .size-option .size-label { flex: 1; }
    .size-option .size-price {
      color: var(--app-accent);
      font-weight: 700;
      white-space: nowrap;
    }

    .size-preview-wrap {
      border-radius: 14px;
      overflow: hidden;
      background: var(--app-secondary-bg);
      border: 1px solid var(--app-border);
      margin-bottom: 20px;
    }
    .size-preview-wrap img {
      display: block;
      width: 100%;
      height: auto;
      transform-origin: center center;
      transition:
        opacity 0.38s cubic-bezier(0.25, 0.46, 0.45, 1),
        transform 0.42s cubic-bezier(0.22, 1, 0.36, 1);
    }
    .size-preview-wrap img.is-exiting {
      opacity: 0;
      transform: scale(0.96) translateY(10px);
    }

    .product-buy {
      width: 100%;
      margin-top: 4px;
      background: var(--app-accent);
      border: none;
      padding: 16px 14px;
      min-height: 52px;
      border-radius: 12px;
      cursor: pointer;
      font-weight: 700;
      color: var(--app-on-accent);
      font-size: 16px;
      font-family: inherit;
      -webkit-tap-highlight-color: transparent;
      touch-action: manipulation;
    }
    .product-buy:active { filter: brightness(0.95); }
    @media (hover: hover) {
      .product-buy:hover { background: var(--app-accent-hover); }
    }
  </style>
</head>
<body>
  <div id="view-catalog">
  <div class="theme-bar">
    <div class="theme-switch" role="group" aria-label="Тема оформлення">
      <button type="button" id="theme-btn-light" data-pick-theme="light" aria-pressed="false" title="Світла тема" aria-label="Світла тема">☀</button>
      <button type="button" id="theme-btn-dark" data-pick-theme="dark" aria-pressed="false" title="Темна тема" aria-label="Темна тема">☽</button>
    </div>
  </div>

  <!-- Логотип -->
  <div class="logo">
    <img src="img/logo.png" alt="Art Studio AI">
  </div>

  <!-- Приветствие -->
  <div class="welcome">Привіт, користувач!</div>

  <!-- Навигация -->
  <nav>
    <button type="button" class="active" data-cat="top" onclick="showCategory('top', this)">🔥 Топ продажів</button>
    <button type="button" data-cat="portraits" onclick="showCategory('portraits', this)">Портрети 👤</button>
    <button type="button" data-cat="couples" onclick="showCategory('couples', this)">Пари 💑</button>
    <button type="button" data-cat="family" onclick="showCategory('family', this)">Сімейні 👨‍👩‍👧‍👦</button>
    <button type="button" data-cat="pets" onclick="showCategory('pets', this)">З улюбленцем 🐾</button>
  </nav>

  <!-- Товары -->
  <section id="products" class="grid"></section>
  </div>

  <div id="view-product" class="view-hidden" hidden>
    <button type="button" class="product-back" id="product-back-btn" aria-label="Назад до каталогу">← Назад</button>
    <div id="product-detail-root" class="product-detail"></div>
  </div>

  <script>
    const DEFAULT_SIZES = [
      { label: '45×55 см', price: 1100, preview: 'img/size/45х55.png' },
      { label: '55×65 см (стандарт)', price: 1500, preview: 'img/size/55х65.png' },
      { label: '60×70 см', price: 2100, preview: 'img/size/60х70.png' }
    ];

    function sizesHavePreviews(sizes) {
      return Array.isArray(sizes) && sizes.length > 0 && sizes.every((s) => s && s.preview);
    }

    const PRODUCT_OIL_PORTRAIT = {
      name: 'Олійний портрет',
      description: 'Олія на полотні з вашого фото: насичений колір, об’єм мазка та чітка деталізація — як у класичному портреті.',
      images: [
        'img/category/portrait/oil/1_oil.png',
        'img/category/portrait/oil/2_oil.png',
        'img/category/portrait/oil/3_oil.png'
      ]
    };

    const PRODUCT_ECHO_CHILDHOOD = {
      name: 'Ехо дитинства',
      description: 'Одне полотно: ви зараз і ви маленькі поруч — ніби зустріч дорослого «я» з дитинством в одному кадрі.',
      images: [
        'img/category/portrait/eho/1.png',
        'img/category/portrait/eho/2.png',
        'img/category/portrait/eho/3.png'
      ]
    };

    const PRODUCT_WITH_PET = {
      name: 'З пухнастим другом',
      description: 'Портрет разом із вашим чотирилапим: тепло, затишно й з любов’ю до всього сімейства, включно з хвостиками.',
      images: [
        'img/category/pats/pat_1/1.png',
        'img/category/pats/pat_1/2.png'
      ]
    };

    const products = {
      top: [PRODUCT_OIL_PORTRAIT, PRODUCT_ECHO_CHILDHOOD, PRODUCT_WITH_PET],
      portraits: [PRODUCT_OIL_PORTRAIT, PRODUCT_ECHO_CHILDHOOD],
      couples: [],
      family: [],
      pets: [PRODUCT_WITH_PET]
    };

    /** Різні стабільні фото (Lorem Picsum) за seed; w×h за замовчуванням квадрат для карток каталогу */
    function demoPhotoUrl(cat, index, title, w, h) {
      const seed = encodeURIComponent([cat, index, title].join('-')).slice(0, 64);
      const W = w || 800;
      const H = h || 800;
      return `https://picsum.photos/seed/${seed}/${W}/${H}`;
    }

    /** Галерея товару — джерело 4:5 (800×1000), як типовий формат картин */
    function productGalleryUrls(cat, index, title) {
      return [0, 1, 2].map((g) => demoPhotoUrl(cat, `${index}-g${g}`, `${title}-фото${g}`, 800, 1000));
    }

    function formatPriceUah(value) {
      return new Intl.NumberFormat('uk-UA', {
        style: 'currency',
        currency: 'UAH',
        maximumFractionDigits: 0
      }).format(value);
    }

    function escHtml(t) {
      return String(t)
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/"/g, '&quot;');
    }

    const MANAGER_TELEGRAM = 'https://t.me/artstudiomanager';

    function buildManagerOrderMessage(productName, sizeLabel) {
      const name = String(productName).replace(/"/g, "'").trim();
      const size = String(sizeLabel).trim();
      return `Вітаю!\nМене цікавить картина: "${name}"\nБажаний розмір: ${size}`;
    }

    function openManagerChatWithOrder(productName, sizeLabel) {
      const text = buildManagerOrderMessage(productName, sizeLabel);
      const url = `${MANAGER_TELEGRAM}?text=${encodeURIComponent(text)}`;
      const tg = window.Telegram && window.Telegram.WebApp;
      if (tg && typeof tg.openTelegramLink === 'function') {
        tg.openTelegramLink(url);
      } else {
        window.open(url, '_blank', 'noopener,noreferrer');
      }
    }

    function closeProduct() {
      document.getElementById('view-catalog').classList.remove('view-hidden');
      const vp = document.getElementById('view-product');
      vp.classList.add('view-hidden');
      vp.hidden = true;
      const tg = window.Telegram && window.Telegram.WebApp;
      if (tg && tg.BackButton) tg.BackButton.hide();
    }

    function openProduct(cat, index) {
      const list = products[cat];
      const p = list && list[index];
      if (!p) return;

      const images = (p.images && p.images.length)
        ? p.images.slice()
        : productGalleryUrls(cat, index, p.name);
      const sizes = p.sizes || DEFAULT_SIZES;
      let selImg = 0;
      let selSize = sizes.length > 1 ? 1 : 0;
      const root = document.getElementById('product-detail-root');
      let sizePreviewGen = 0;
      let sizePreviewExitListener = null;

      function syncThumbState() {
        root.querySelectorAll('[data-thumb]').forEach((b) => {
          const j = +b.getAttribute('data-thumb');
          const on = j === selImg;
          b.classList.toggle('is-active', on);
          b.setAttribute('aria-selected', on ? 'true' : 'false');
        });
      }

      function syncSizeState() {
        root.querySelectorAll('[data-size]').forEach((b) => {
          const j = +b.getAttribute('data-size');
          const on = j === selSize;
          b.classList.toggle('is-selected', on);
          b.setAttribute('aria-selected', on ? 'true' : 'false');
        });
        syncSizePreview();
      }

      function syncSizePreview() {
        const imgEl = document.getElementById('size-preview-img');
        if (!imgEl || !sizesHavePreviews(sizes)) return;
        const s = sizes[selSize];
        const nextSrc = s && s.preview;
        if (!nextSrc) return;
        if (imgEl.getAttribute('data-src-key') === nextSrc) return;

        const reduceMotion = window.matchMedia && matchMedia('(prefers-reduced-motion: reduce)').matches;
        if (reduceMotion) {
          if (sizePreviewExitListener) {
            imgEl.removeEventListener('transitionend', sizePreviewExitListener);
            sizePreviewExitListener = null;
          }
          imgEl.classList.remove('is-exiting');
          imgEl.src = nextSrc;
          imgEl.setAttribute('data-src-key', nextSrc);
          imgEl.alt = `Приклад розміру ${s.label}`;
          return;
        }

        if (sizePreviewExitListener) {
          imgEl.removeEventListener('transitionend', sizePreviewExitListener);
          sizePreviewExitListener = null;
        }
        imgEl.classList.remove('is-exiting');

        const myGen = ++sizePreviewGen;
        let loadDone = false;
        let exitDone = false;

        const tryFinish = () => {
          if (myGen !== sizePreviewGen) return;
          if (!loadDone || !exitDone) return;
          if (sizePreviewExitListener) {
            imgEl.removeEventListener('transitionend', sizePreviewExitListener);
            sizePreviewExitListener = null;
          }
          imgEl.src = nextSrc;
          imgEl.setAttribute('data-src-key', nextSrc);
          imgEl.alt = `Приклад розміру ${s.label}`;
          imgEl.classList.remove('is-exiting');
        };

        const loader = new Image();
        loader.onload = loader.onerror = () => {
          if (myGen !== sizePreviewGen) return;
          loadDone = true;
          tryFinish();
        };
        loader.src = nextSrc;

        sizePreviewExitListener = (e) => {
          if (myGen !== sizePreviewGen) return;
          if (e.propertyName !== 'opacity') return;
          exitDone = true;
          tryFinish();
        };
        imgEl.addEventListener('transitionend', sizePreviewExitListener);

        requestAnimationFrame(() => {
          if (myGen !== sizePreviewGen) return;
          imgEl.classList.add('is-exiting');
        });
      }

      function swapMainImageWithFade() {
        const main = document.getElementById('product-main-img');
        if (!main) return;
        const nextSrc = images[selImg];
        if (main.getAttribute('data-src-key') === nextSrc) return;
        const reduceMotion = window.matchMedia && matchMedia('(prefers-reduced-motion: reduce)').matches;
        if (reduceMotion) {
          main.src = nextSrc;
          main.setAttribute('data-src-key', nextSrc);
          return;
        }
        main.style.opacity = '0';
        const loader = new Image();
        loader.onload = () => {
          main.src = nextSrc;
          main.setAttribute('data-src-key', nextSrc);
          requestAnimationFrame(() => {
            main.style.opacity = '1';
          });
        };
        loader.onerror = () => {
          main.src = nextSrc;
          main.setAttribute('data-src-key', nextSrc);
          main.style.opacity = '1';
        };
        loader.src = nextSrc;
      }

      function renderDetail() {
        root.innerHTML = `
          <h1>${escHtml(p.name)}</h1>
          <p class="product-desc">${escHtml(p.description)}</p>
          <div class="product-gallery-main">
            <div class="product-gallery-frame">
              <img id="product-main-img" src="${escHtml(images[selImg])}" alt="${escHtml(p.name)}" decoding="async" sizes="100vw" data-src-key="${escHtml(images[selImg])}">
            </div>
          </div>
          <div class="product-thumbs" role="tablist" aria-label="Галерея">
            ${images.map((url, i) => `
              <button type="button" role="tab" aria-selected="${i === selImg}" class="${i === selImg ? 'is-active' : ''}" data-thumb="${i}" aria-label="Фото ${i + 1}">
                <span class="product-thumb-frame">
                  <img src="${escHtml(url)}" alt="" loading="lazy" decoding="async" sizes="88px">
                </span>
              </button>
            `).join('')}
          </div>
          <p class="product-section-title">Розмір</p>
          <div class="size-list" role="listbox" aria-label="Розмір картини">
            ${sizes.map((s, i) => `
              <button type="button" role="option" aria-selected="${i === selSize}" class="size-option ${i === selSize ? 'is-selected' : ''}" data-size="${i}">
                <span class="size-label">${escHtml(s.label)}</span>
                <span class="size-price">${escHtml(formatPriceUah(s.price))}</span>
              </button>
            `).join('')}
          </div>
          ${sizesHavePreviews(sizes) ? `
          <p class="product-section-title">Приклад розміру в інтер’єрі</p>
          <div class="size-preview-wrap">
            <img id="size-preview-img" src="${escHtml(sizes[selSize].preview)}" alt="Приклад розміру ${escHtml(sizes[selSize].label)}" decoding="async" sizes="100vw" data-src-key="${escHtml(sizes[selSize].preview)}">
          </div>
          ` : ''}
          <button type="button" class="product-buy" id="product-buy-btn" aria-label="Замовити в Telegram">${escHtml('Замовити')}</button>
        `;

        root.querySelectorAll('[data-thumb]').forEach((btn) => {
          btn.addEventListener('click', () => {
            const i = +btn.getAttribute('data-thumb');
            if (i === selImg) return;
            selImg = i;
            syncThumbState();
            swapMainImageWithFade();
          });
        });
        root.querySelectorAll('[data-size]').forEach((btn) => {
          btn.addEventListener('click', () => {
            selSize = +btn.getAttribute('data-size');
            syncSizeState();
          });
        });
        root.querySelector('#product-buy-btn').addEventListener('click', () => {
          const s = sizes[selSize];
          openManagerChatWithOrder(p.name, s.label);
        });
      }

      renderDetail();

      document.getElementById('view-catalog').classList.add('view-hidden');
      const vp = document.getElementById('view-product');
      vp.classList.remove('view-hidden');
      vp.hidden = false;
      window.scrollTo(0, 0);

      const tg = window.Telegram && window.Telegram.WebApp;
      if (tg && tg.BackButton) tg.BackButton.show();
    }

    function showCategory(cat, btn) {
      document.querySelectorAll('nav button').forEach((b) => b.classList.remove('active'));
      const activeBtn = btn || document.querySelector(`nav button[data-cat="${cat}"]`);
      if (activeBtn) activeBtn.classList.add('active');
      const grid = document.getElementById('products');

      const buildCards = () => {
        grid.innerHTML = '';
        const list = products[cat] || [];
        grid.classList.toggle('grid--empty', list.length === 0);

        if (!list.length) {
          grid.innerHTML = `
            <div class="catalog-empty" role="status">
              <p class="catalog-empty-title">Тут поки ні душі… ну майже 🎨</p>
              <p class="catalog-empty-text">Розділ у розробці — готуємо нові картини. Загляніть згодом або оберіть іншу категорію.</p>
            </div>`;
          return;
        }

        list.forEach((p, i) => {
          const img = (p.images && p.images[0]) ? p.images[0] : demoPhotoUrl(cat, i, p.name);
          const altAttr = escHtml(p.name);
          grid.innerHTML += `
          <div class="card">
            <img src="${img}" alt="${altAttr}" loading="lazy" decoding="async">
            <h3>${escHtml(p.name)}</h3>
            <button type="button" data-open-product="${cat}:${i}">Переглянути</button>
          </div>`;
        });
      };

      if (!grid.dataset.catPrimed) {
        grid.dataset.catPrimed = '1';
        buildCards();
        return;
      }

      const reduceMotion = window.matchMedia && matchMedia('(prefers-reduced-motion: reduce)').matches;
      if (reduceMotion) {
        buildCards();
        return;
      }

      grid.classList.remove('grid--cat-enter');
      const onHideEnd = (e) => {
        if (e.target !== grid || e.propertyName !== 'opacity') return;
        grid.removeEventListener('transitionend', onHideEnd);
        buildCards();
        grid.classList.remove('grid--cat-hiding');
        grid.classList.add('grid--cat-enter');
        const onEnterEnd = () => {
          grid.classList.remove('grid--cat-enter');
          grid.removeEventListener('animationend', onEnterEnd);
        };
        grid.addEventListener('animationend', onEnterEnd);
      };
      grid.addEventListener('transitionend', onHideEnd);
      requestAnimationFrame(() => {
        grid.classList.add('grid--cat-hiding');
      });
    }

    const THEME_STORAGE_KEY = 'artstudio-theme';

    function systemPreferredTheme() {
      const tg = window.Telegram && window.Telegram.WebApp;
      if (tg && tg.colorScheme === 'dark') return 'dark';
      if (tg && tg.colorScheme === 'light') return 'light';
      if (window.matchMedia && matchMedia('(prefers-color-scheme: dark)').matches) return 'dark';
      return 'light';
    }

    function getStoredThemeChoice() {
      try {
        const v = localStorage.getItem(THEME_STORAGE_KEY);
        return v === 'light' || v === 'dark' ? v : null;
      } catch (e) {
        return null;
      }
    }

    function applyDocumentTheme(mode) {
      const m = mode === 'dark' ? 'dark' : 'light';
      document.documentElement.setAttribute('data-theme', m);
      const lightBtn = document.getElementById('theme-btn-light');
      const darkBtn = document.getElementById('theme-btn-dark');
      if (lightBtn) lightBtn.setAttribute('aria-pressed', m === 'light' ? 'true' : 'false');
      if (darkBtn) darkBtn.setAttribute('aria-pressed', m === 'dark' ? 'true' : 'false');
      const bg = getComputedStyle(document.documentElement).getPropertyValue('--app-bg').trim() || '#ffffff';
      document.querySelector('meta[name="theme-color"]')?.setAttribute('content', bg);
      const tg = window.Telegram && window.Telegram.WebApp;
      if (!tg) return;
      try {
        tg.setHeaderColor(bg);
      } catch (e) { /* ignore */ }
      try {
        if (typeof tg.setBackgroundColor === 'function') tg.setBackgroundColor(bg);
      } catch (e) { /* ignore */ }
    }

    function pickTheme(mode, persist) {
      if (persist) {
        try {
          localStorage.setItem(THEME_STORAGE_KEY, mode);
        } catch (e) { /* ignore */ }
      }
      applyDocumentTheme(mode);
    }

    (function initTelegram() {
      const tg = window.Telegram && window.Telegram.WebApp;
      if (!tg) return;
      tg.ready();
      tg.expand();
      if (tg.BackButton) {
        tg.BackButton.onClick(() => {
          const vp = document.getElementById('view-product');
          if (vp && !vp.classList.contains('view-hidden')) closeProduct();
        });
      }
    })();

    (function initThemeControls() {
      const lightBtn = document.getElementById('theme-btn-light');
      const darkBtn = document.getElementById('theme-btn-dark');
      const stored = getStoredThemeChoice();
      const initial = stored || systemPreferredTheme();
      applyDocumentTheme(initial);

      if (lightBtn) {
        lightBtn.addEventListener('click', () => pickTheme('light', true));
      }
      if (darkBtn) {
        darkBtn.addEventListener('click', () => pickTheme('dark', true));
      }

      const tg = window.Telegram && window.Telegram.WebApp;
      if (tg) {
        tg.onEvent('themeChanged', () => {
          if (getStoredThemeChoice()) return;
          applyDocumentTheme(systemPreferredTheme());
        });
      }

      if (window.matchMedia) {
        const mq = matchMedia('(prefers-color-scheme: dark)');
        const onOsTheme = () => {
          if (getStoredThemeChoice()) return;
          if (window.Telegram && window.Telegram.WebApp) return;
          applyDocumentTheme(systemPreferredTheme());
        };
        if (typeof mq.addEventListener === 'function') {
          mq.addEventListener('change', onOsTheme);
        } else {
          mq.addListener(onOsTheme);
        }
      }
    })();

    document.getElementById('product-back-btn').addEventListener('click', closeProduct);
    document.getElementById('products').addEventListener('click', (e) => {
      const btn = e.target.closest('[data-open-product]');
      if (!btn) return;
      const key = btn.getAttribute('data-open-product');
      const colon = key.indexOf(':');
      if (colon < 0) return;
      openProduct(key.slice(0, colon), parseInt(key.slice(colon + 1), 10));
    });

    showCategory('top');
  </script>
</body>
</html>
