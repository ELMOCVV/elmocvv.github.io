<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8">
  <title>Art Studio AI</title>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600&display=swap" rel="stylesheet">
  <style>
    body { background:#0d0d0d; color:#fff; font-family:'Montserrat', sans-serif; margin:0; }
    header { padding:20px; text-align:center; font-size:24px; font-weight:600; color:#00ffd5; }
    header img { height:50px; vertical-align:middle; margin-right:10px; }
    nav { display:flex; overflow-x:auto; gap:10px; padding:10px; background:#111; }
    nav button { flex:0 0 auto; background:#1a1a1a; border:none; padding:10px 20px; border-radius:8px; color:#fff; cursor:pointer; transition:0.3s; }
    nav button.active, nav button:hover { background:#00ffd5; color:#000; }
    .grid { display:grid; grid-template-columns:repeat(auto-fit,minmax(200px,1fr)); gap:20px; padding:20px; }
    .card { background:#1a1a1a; border-radius:12px; padding:15px; text-align:center; box-shadow:0 4px 10px rgba(0,0,0,0.5); }
    .card img { width:100%; border-radius:8px; }
    .card h3 { margin:10px 0; }
    .card button { margin-top:10px; background:#00ffd5; border:none; padding:10px; border-radius:6px; cursor:pointer; font-weight:600; }
  </style>
</head>
<body>
  <header>
    <!-- Логотип: вставь свой файл -->
    <img src="logo.png" alt="Логотип"> Art Studio AI
  </header>

  <nav>
    <button class="active" onclick="showCategory('top')">🔥 Топ продажів</button>
    <button onclick="showCategory('men')">👔 Для нього</button>
    <button onclick="showCategory('women')">💎 Для неї</button>
  </nav>

  <section id="products" class="grid">
    <!-- По умолчанию показываем бестселери -->
    <div class="card">
      <img src="https://via.placeholder.com/200x200" alt="Товар">
      <h3>Картина №1</h3>
      <button onclick="Telegram.WebApp.sendData('Картина №1')">Купити</button>
    </div>
    <div class="card">
      <img src="https://via.placeholder.com/200x200" alt="Товар">
      <h3>Картина №2</h3>
      <button onclick="Telegram.WebApp.sendData('Картина №2')">Купити</button>
    </div>
  </section>

  <script>
    const products = {
      top: [
        {name:"Картина №1", img:"https://via.placeholder.com/200x200"},
        {name:"Картина №2", img:"https://via.placeholder.com/200x200"}
      ],
      men: [
        {name:"Картина для нього", img:"https://via.placeholder.com/200x200"}
      ],
      women: [
        {name:"Картина для неї", img:"https://via.placeholder.com/200x200"}
      ]
    };

    function showCategory(cat) {
      document.querySelectorAll("nav button").forEach(b=>b.classList.remove("active"));
      event.target.classList.add("active");
      const grid = document.getElementById("products");
      grid.innerHTML = "";
      products[cat].forEach(p=>{
        grid.innerHTML += `
          <div class="card">
            <img src="${p.img}" alt="${p.name}">
            <h3>${p.name}</h3>
            <button onclick="Telegram.WebApp.sendData('${p.name}')">Купити</button>
          </div>`;
      });
    }
  </script>
</body>
</html>
