<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8">
  <title>Art Studio AI</title>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600&display=swap" rel="stylesheet">
  <style>
    body { background:#fff; color:#222; font-family:'Montserrat', sans-serif; margin:0; }
    header { padding:15px; text-align:center; font-size:24px; font-weight:600; color:#0057ff; border-bottom:2px solid #eaeaea; }
    header img { height:44px; vertical-align:middle; margin-right:10px; }

    nav { display:flex; overflow-x:auto; gap:12px; padding:12px; background:#f9f9f9; border-bottom:1px solid #ddd; scroll-behavior:smooth; }
    nav::-webkit-scrollbar { display:none; }
    nav button { flex:0 0 auto; background:#fff; border:2px solid #0057ff; padding:10px 18px; border-radius:22px; color:#0057ff; cursor:pointer; transition:0.3s; font-weight:600; font-size:16px; }
    nav button.active, nav button:hover { background:#0057ff; color:#fff; }

    .grid { display:grid; grid-template-columns:repeat(2,1fr); gap:16px; padding:16px; }
    .card { background:#fdfdfd; border-radius:14px; padding:14px; text-align:center; border:1px solid #eee; box-shadow:0 2px 6px rgba(0,0,0,0.05); }
    .card img { width:100%; aspect-ratio:1/1; object-fit:cover; border-radius:8px; }
    .card h3 { margin:12px 0; font-size:18px; font-weight:600; }
    .card button { margin-top:10px; background:#0057ff; border:none; padding:12px; border-radius:8px; cursor:pointer; font-weight:700; color:#fff; font-size:16px; width:100%; }
    .card button:hover { background:#003bb5; }

    /* Мобильная оптимизация */
    @media (max-width:600px) {
      header { font-size:22px; }
      nav button { font-size:15px; padding:10px 16px; }
      .grid { gap:14px; padding:14px; }
      .card h3 { font-size:17px; }
      .card button { font-size:15px; padding:12px; }
    }
  </style>
</head>
<body>
  <header>
    <img src="logo.png" alt="Логотип"> Art Studio AI
  </header>

  <nav>
    <button class="active" onclick="showCategory('top')">🔥 Топ продажів</button>
    <button onclick="showCategory('men')">👔 Для нього</button>
    <button onclick="showCategory('women')">💎 Для неї</button>
  </nav>

  <section id="products" class="grid"></section>

  <script>
    const products = {
      top: [
        {name:"Картина №1", img:"https://via.placeholder.com/500"},
        {name:"Картина №2", img:"https://via.placeholder.com/500"},
        {name:"Картина №3", img:"https://via.placeholder.com/500"}
      ],
      men: [
        {name:"Картина для нього", img:"https://via.placeholder.com/500"},
        {name:"Картина для нього 2", img:"https://via.placeholder.com/500"}
      ],
      women: [
        {name:"Картина для неї", img:"https://via.placeholder.com/500"},
        {name:"Картина для неї 2", img:"https://via.placeholder.com/500"}
      ]
    };

    function showCategory(cat) {
      document.querySelectorAll("nav button").forEach(b=>b.classList.remove("active"));
      event.target.classList.add("active");
      const grid = document.getElementById("products");
      grid.innerHTML = "";
      products[cat].forEach(p=>{
        grid.innerHTML += `
          <div class="card">
            <img src="${p.img}" alt="${p.name}">
            <h3>${p.name}</h3>
            <button onclick="Telegram.WebApp.sendData('${p.name}')">Купити</button>
          </div>`;
      });
    }

    // по умолчанию показываем топ
    showCategory('top');
  </script>
</body>
</html>
