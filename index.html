<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#ffffff">
  <title>Art Studio AI</title>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <script>
    (function () {
      function initialTheme() {
        try {
          var stored = localStorage.getItem('artstudio-theme');
          if (stored === 'light' || stored === 'dark') return stored;
          var tg = window.Telegram && window.Telegram.WebApp;
          if (tg && tg.colorScheme === 'dark') return 'dark';
          if (tg && tg.colorScheme === 'light') return 'light';
          if (window.matchMedia && matchMedia('(prefers-color-scheme: dark)').matches) return 'dark';
        } catch (e) { /* приватний режим тощо */ }
        return 'light';
      }
      document.documentElement.setAttribute('data-theme', initialTheme());
    })();
  </script>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@500;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; }

    /* Дві фіксовані бренд-теми; активна — через data-theme на <html> */
    html[data-theme="light"] {
      --app-bg: #ffffff;
      --app-text: #222222;
      --app-accent: #005c9c;
      --app-accent-hover: #004a7a;
      --app-secondary-bg: #f9f9f9;
      --app-card-bg: #fdfdfd;
      --app-border: #eeeeee;
      --app-border-nav: #dddddd;
      --app-on-accent: #ffffff;
      --app-welcome: #005c9c;
      --app-card-shadow: rgba(0, 0, 0, 0.06);
      --app-theme-switch-bg: #f0f3f6;
      --app-theme-switch-muted: rgba(34, 34, 34, 0.45);
    }
    html[data-theme="dark"] {
      --app-bg: #161a1f;
      --app-text: #e8eaef;
      --app-accent: #3d9fd4;
      --app-accent-hover: #5cb3e0;
      --app-secondary-bg: #1f242c;
      --app-card-bg: #232a33;
      --app-border: #343c48;
      --app-border-nav: #2c333d;
      --app-on-accent: #ffffff;
      --app-welcome: #6ec5ff;
      --app-card-shadow: rgba(0, 0, 0, 0.35);
      --app-theme-switch-bg: #252b34;
      --app-theme-switch-muted: rgba(232, 234, 239, 0.45);
    }

    html {
      -webkit-text-size-adjust: 100%;
      height: 100%;
      color-scheme: light dark;
    }

    body {
      margin: 0;
      min-height: 100%;
      min-height: 100dvh;
      background: var(--app-bg);
      color: var(--app-text);
      font-family: 'Montserrat', sans-serif;
      overflow-x: hidden;
      padding:
        max(12px, env(safe-area-inset-top))
        max(12px, env(safe-area-inset-right))
        max(16px, env(safe-area-inset-bottom))
        max(12px, env(safe-area-inset-left));
      padding-bottom: max(20px, calc(env(safe-area-inset-bottom) + 8px));
    }

    /* Перемикач теми */
    .theme-bar {
      display: flex;
      justify-content: flex-end;
      align-items: center;
      margin: -4px 0 4px;
      padding: 0 2px;
    }
    .theme-switch {
      display: inline-flex;
      padding: 3px;
      border-radius: 999px;
      background: var(--app-theme-switch-bg);
      border: 1px solid var(--app-border);
      gap: 2px;
    }
    .theme-switch button {
      margin: 0;
      border: none;
      cursor: pointer;
      font: inherit;
      font-size: 15px;
      line-height: 1;
      min-width: 40px;
      min-height: 36px;
      border-radius: 999px;
      padding: 8px 10px;
      background: transparent;
      color: var(--app-theme-switch-muted);
      transition: background 0.2s, color 0.2s;
      -webkit-tap-highlight-color: transparent;
      touch-action: manipulation;
    }
    .theme-switch button[aria-pressed="true"] {
      background: var(--app-accent);
      color: var(--app-on-accent);
      box-shadow: 0 1px 3px var(--app-card-shadow);
    }
    .theme-switch button[aria-pressed="false"]:active {
      color: var(--app-text);
      opacity: 0.85;
    }
    @media (hover: hover) {
      .theme-switch button[aria-pressed="false"]:hover {
        color: var(--app-text);
      }
    }

    /* Логотип */
    .logo {
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 16px 12px 12px;
    }
    .logo img {
      width: min(420px, 88vw);
      max-width: 100%;
      height: auto;
      display: block;
      object-fit: contain;
      background: var(--app-bg);
      border-radius: 12px;
    }

    /* Приветствие */
    .welcome {
      text-align: center;
      font-size: clamp(18px, 4.5vw, 22px);
      font-weight: 600;
      color: var(--app-welcome);
      margin-bottom: 12px;
      line-height: 1.3;
      padding: 0 4px;
    }

    /*
      Смуга категорій на всю ширину екрана (компенсація padding body),
      щоб при горизонтальному скролі не з’являлась біла смуга збоку.
    */
    nav {
      display: flex;
      overflow-x: auto;
      gap: 10px;
      margin-left: calc(-1 * max(12px, env(safe-area-inset-left)));
      margin-right: calc(-1 * max(12px, env(safe-area-inset-right)));
      padding: 12px max(12px, env(safe-area-inset-right)) 12px max(12px, env(safe-area-inset-left));
      background: var(--app-secondary-bg);
      border-bottom: 1px solid var(--app-border-nav);
      scroll-behavior: smooth;
      -webkit-overflow-scrolling: touch;
      scrollbar-width: none;
    }
    nav::-webkit-scrollbar { display: none; }
    nav button {
      flex: 0 0 auto;
      background: var(--app-bg);
      border: 2px solid var(--app-accent);
      padding: 12px 18px;
      min-height: 44px;
      border-radius: 22px;
      color: var(--app-accent);
      cursor: pointer;
      transition: background 0.2s, color 0.2s, border-color 0.2s;
      font-weight: 600;
      font-size: clamp(14px, 3.8vw, 17px);
      font-family: inherit;
      -webkit-tap-highlight-color: transparent;
      touch-action: manipulation;
    }
    nav button.active,
    nav button:active {
      background: var(--app-accent);
      border-color: var(--app-accent);
      color: var(--app-on-accent);
    }

    @media (hover: hover) {
      nav button:hover { background: var(--app-accent); color: var(--app-on-accent); }
      nav button.active:hover { filter: brightness(1.05); }
      .card button:hover { background: var(--app-accent-hover); }
    }

    /* Сетка товаров */
    .grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: clamp(10px, 3vw, 18px);
      padding: 14px 0 0;
      max-width: 100%;
    }
    .card {
      background: var(--app-card-bg);
      border-radius: 14px;
      padding: clamp(10px, 3vw, 16px);
      text-align: center;
      border: 1px solid var(--app-border);
      box-shadow: 0 2px 8px var(--app-card-shadow);
      min-width: 0;
    }
    .card img {
      width: 100%;
      aspect-ratio: 1 / 1;
      object-fit: cover;
      border-radius: 10px;
      vertical-align: middle;
    }
    .card h3 {
      margin: 10px 0 0;
      font-size: clamp(14px, 3.6vw, 18px);
      font-weight: 600;
      line-height: 1.25;
      word-break: break-word;
      color: var(--app-text);
    }
    .card button {
      margin-top: 10px;
      background: var(--app-accent);
      border: none;
      padding: 14px 12px;
      min-height: 44px;
      border-radius: 10px;
      cursor: pointer;
      font-weight: 700;
      color: var(--app-on-accent);
      font-size: clamp(14px, 3.6vw, 17px);
      font-family: inherit;
      width: 100%;
      -webkit-tap-highlight-color: transparent;
      touch-action: manipulation;
    }
    .card button:active { filter: brightness(0.95); }

    /* Очень узкие экраны — одна колонка читается лучше */
    @media (max-width: 340px) {
      .grid { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <div class="theme-bar">
    <div class="theme-switch" role="group" aria-label="Тема оформлення">
      <button type="button" id="theme-btn-light" data-pick-theme="light" aria-pressed="false" title="Світла тема" aria-label="Світла тема">☀</button>
      <button type="button" id="theme-btn-dark" data-pick-theme="dark" aria-pressed="false" title="Темна тема" aria-label="Темна тема">☽</button>
    </div>
  </div>

  <!-- Логотип -->
  <div class="logo">
    <img src="img/logo.png" alt="Art Studio AI">
  </div>

  <!-- Приветствие -->
  <div class="welcome">Привіт, користувач!</div>

  <!-- Навигация -->
  <nav>
    <button type="button" class="active" data-cat="top" onclick="showCategory('top', this)">🔥 Топ продажів</button>
    <button type="button" data-cat="men" onclick="showCategory('men', this)">👔 Для нього</button>
    <button type="button" data-cat="women" onclick="showCategory('women', this)">💎 Для неї</button>
  </nav>

  <!-- Товары -->
  <section id="products" class="grid"></section>

  <script>
    const products = {
      top: [
        { name: "Картина №1" },
        { name: "Картина №2" },
        { name: "Картина №3" },
        { name: "Картина №4" },
        { name: "Картина №5" },
        { name: "Картина №6" }
      ],
      men: [
        { name: "Пейзаж для нього" },
        { name: "Абстракція для нього" },
        { name: "Мінімалізм для нього" },
        { name: "Портрет для нього" },
        { name: "Геометрія для нього" },
        { name: "Нічне місто для нього" }
      ],
      women: [
        { name: "Квіти для неї" },
        { name: "Пастель для неї" },
        { name: "Вінтаж для неї" },
        { name: "Мрія для неї" },
        { name: "Світанок для неї" },
        { name: "Золото для неї" }
      ]
    };

    /** Різні реальні фото з мережі (Lorem Picsum): стабільне зображення на кожну картку */
    function demoPhotoUrl(cat, index, title) {
      const seed = encodeURIComponent([cat, index, title].join("-")).slice(0, 64);
      return `https://picsum.photos/seed/${seed}/800/800`;
    }

    function showCategory(cat, btn) {
      document.querySelectorAll("nav button").forEach(b => b.classList.remove("active"));
      const activeBtn = btn || document.querySelector(`nav button[data-cat="${cat}"]`);
      if (activeBtn) activeBtn.classList.add("active");
      const grid = document.getElementById("products");
      grid.innerHTML = "";
      products[cat].forEach((p, i) => {
        const img = demoPhotoUrl(cat, i, p.name);
        const safeName = p.name.replace(/'/g, "\\'");
        const altAttr = p.name.replace(/&/g, "&amp;").replace(/"/g, "&quot;");
        grid.innerHTML += `
          <div class="card">
            <img src="${img}" alt="${altAttr}" loading="lazy" decoding="async">
            <h3>${p.name}</h3>
            <button onclick="Telegram.WebApp.sendData('${safeName}')">Купити</button>
          </div>`;
      });
    }

    const THEME_STORAGE_KEY = 'artstudio-theme';

    function systemPreferredTheme() {
      const tg = window.Telegram && window.Telegram.WebApp;
      if (tg && tg.colorScheme === 'dark') return 'dark';
      if (tg && tg.colorScheme === 'light') return 'light';
      if (window.matchMedia && matchMedia('(prefers-color-scheme: dark)').matches) return 'dark';
      return 'light';
    }

    function getStoredThemeChoice() {
      try {
        const v = localStorage.getItem(THEME_STORAGE_KEY);
        return v === 'light' || v === 'dark' ? v : null;
      } catch (e) {
        return null;
      }
    }

    function applyDocumentTheme(mode) {
      const m = mode === 'dark' ? 'dark' : 'light';
      document.documentElement.setAttribute('data-theme', m);
      const lightBtn = document.getElementById('theme-btn-light');
      const darkBtn = document.getElementById('theme-btn-dark');
      if (lightBtn) lightBtn.setAttribute('aria-pressed', m === 'light' ? 'true' : 'false');
      if (darkBtn) darkBtn.setAttribute('aria-pressed', m === 'dark' ? 'true' : 'false');
      const bg = getComputedStyle(document.documentElement).getPropertyValue('--app-bg').trim() || '#ffffff';
      document.querySelector('meta[name="theme-color"]')?.setAttribute('content', bg);
      const tg = window.Telegram && window.Telegram.WebApp;
      if (!tg) return;
      try {
        tg.setHeaderColor(bg);
      } catch (e) { /* ignore */ }
      try {
        if (typeof tg.setBackgroundColor === 'function') tg.setBackgroundColor(bg);
      } catch (e) { /* ignore */ }
    }

    function pickTheme(mode, persist) {
      if (persist) {
        try {
          localStorage.setItem(THEME_STORAGE_KEY, mode);
        } catch (e) { /* ignore */ }
      }
      applyDocumentTheme(mode);
    }

    (function initTelegram() {
      const tg = window.Telegram && window.Telegram.WebApp;
      if (!tg) return;
      tg.ready();
      tg.expand();
    })();

    (function initThemeControls() {
      const lightBtn = document.getElementById('theme-btn-light');
      const darkBtn = document.getElementById('theme-btn-dark');
      const stored = getStoredThemeChoice();
      const initial = stored || systemPreferredTheme();
      applyDocumentTheme(initial);

      if (lightBtn) {
        lightBtn.addEventListener('click', () => pickTheme('light', true));
      }
      if (darkBtn) {
        darkBtn.addEventListener('click', () => pickTheme('dark', true));
      }

      const tg = window.Telegram && window.Telegram.WebApp;
      if (tg) {
        tg.onEvent('themeChanged', () => {
          if (getStoredThemeChoice()) return;
          applyDocumentTheme(systemPreferredTheme());
        });
      }

      if (window.matchMedia) {
        const mq = matchMedia('(prefers-color-scheme: dark)');
        const onOsTheme = () => {
          if (getStoredThemeChoice()) return;
          if (window.Telegram && window.Telegram.WebApp) return;
          applyDocumentTheme(systemPreferredTheme());
        };
        if (typeof mq.addEventListener === 'function') {
          mq.addEventListener('change', onOsTheme);
        } else {
          mq.addListener(onOsTheme);
        }
      }
    })();

    showCategory('top');
  </script>
</body>
</html>
